<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطعم المُعز👑</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* ضبط الخلفية الأساسية للشاشات الكبيرة */
            background-image: url('./background.jpg');
            background-color: #03020c;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            
            /* ملء الشاشة بالظبط وتوسيط الكارت */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* الحاوية السوداء الشفافة */
        .container { 
            position: relative; 
            z-index: 2; 
            color: white; 
            text-align: center; 
            max-width: 450px; 
            width: 100%; 
            padding: 40px 25px; 
            background: rgba(0, 0, 0, 0.78); /* سواد أعمق ليمتزج مع الفضاء */
            border: 2px solid #ffcc00; 
            border-radius: 30px; 
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.25); 
            transition: all 0.3s ease;
        }

        /* شعلة النار */
        .fire-icon {
            font-size: 32px;
            margin-bottom: 5px;
            animation: pulse 1.5s infinite alternate;
        }

        h1 { 
            font-size: 38px; 
            font-weight: 900; 
            margin: 0px 0 10px 0; 
            color: #ffcc00; 
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.6); 
        }

        p.subtitle { 
            font-size: 17px; 
            color: #ffffff; 
            font-weight: bold; 
            margin-bottom: 25px; 
        }

        /* أقسام الأكل */
        .categories {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .cat-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 204, 0, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }

        .btns { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        /* زر أطلب على السريع */
        .btn-order { 
            border: none; 
            padding: 14px 45px; 
            font-size: 20px; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            background: #ffcc00;
            color: #000000; 
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.35);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-order:hover { 
            background: #ffa600;
            transform: scale(1.03); 
        }

        /* بيانات الاتصال */
        .footer-info {
            margin-top: 30px;
            font-size: 13px;
            color: #e2e2e8;
            line-height: 1.5;
            font-weight: 500;
        }

        .footer-info span {
            display: block;
            margin-top: 5px;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        /* 📱 شاشات الموبايل (المقاسات الذكية المحدثة) */
        @media (max-width: 480px) {
            body {
                padding: 10px;
                /* إجبار الخلفية على الظهور كاملة بنسبة 100% عرض وارتفاع لمنع القص */
                background-size: 100% 100%;
                background-attachment: scroll; /* إلغاء الـ fixed لتفادي مشاكل متصفحات الموبايل */
                background-position: center center;
            }
            
            .container {
                width: 92%; /* الكارت يلم نفسه شوية عشان يسيب مساحة للخلفية تبان من الأطراف */
                padding: 20px 15px;
                border-radius: 25px;
                background: rgba(0, 0, 0, 0.82); /* زيادة التباين لتسهيل القراءة على الموبايل */
            }

            /* تصغير النصوص عشان تليق مع حجم الموبايل */
            .fire-icon { font-size: 24px; }
            h1 { font-size: 26px; }
            p.subtitle { font-size: 14px; margin-bottom: 20px; }
            
            .categories { margin-bottom: 20px; gap: 6px; }
            .cat-item { font-size: 12px; padding: 5px 10px; }
            
            .btn-order { font-size: 16px; padding: 10px 30px; }
            
            .footer-info { margin-top: 20px; font-size: 11px; }
        }

        /* 📟 للشاشات المتوسطة كـ التابلت */
        @media (min-width: 481px) and (max-width: 768px) {
            body {
                background-size: 100% 100%;
                background-attachment: scroll;
            }
            .container {
                width: 75%;
                padding: 35px 20px;
            }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="fire-icon">&#128293;</div>
        
        <h1>👑مطعم المُعز👑</h1>
        <p class="subtitle">🚀 طعم من كوكب تاني 🚀</p>

        <div class="categories">
            <div class="cat-item">🌯 شاورما</div>
            <div class="cat-item">🍗 وجبات</div>
            <div class="cat-item">🥞 كريب</div>
            <div class="cat-item">🍟 مقبلات</div>
        </div>

        <div class="btns">
            <button class="btn-order" onclick="window.location.href='menu.html'">
                اطلب على السريع 🚀
            </button>
        </div>

        <div class="footer-info">
            <span>📍 - ||سمسطا - شارع 26 يوليو - امام شارع الدهشانيه</span>
            <span>📞 012 0998 9112</span>
        </div>
    </div>

</body>
</html>
