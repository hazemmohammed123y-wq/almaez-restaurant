<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم المُعز - بوابة الدخول 👑</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #03020c url('https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?q=80&w=1200') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(147, 51, 234, 0.25) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(6, 182, 212, 0.2) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        .container { 
            position: relative; 
            z-index: 2; 
            color: white; 
            text-align: center; 
            max-width: 430px; 
            width: 90%; 
            padding: 105px 25px 40px 25px; 
            background: rgba(10, 11, 26, 0.7); 
            border: 2px solid rgba(6, 182, 212, 0.6); 
            border-radius: 30px; 
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.4), 
                        0 0 80px rgba(147, 51, 234, 0.2), 
                        inset 0 0 25px rgba(6, 182, 212, 0.2); 
            backdrop-filter: blur(20px); 
            box-sizing: border-box; 
            margin: 20px; 
        }

        /* 🌯 صورة الشاورما الطايرة 🌯 */
        .shawarma-fly {
            position: absolute;
            top: -110px; /* خارج برة الإطار من فوق */
            left: 50%;
            transform: translateX(-50%);
            width: 160px; /* مقاس مناسب */
            height: auto;
            /* استخدام المسار المحلي بعد حفظ الصورة */
            content: url('shawarma.png'); 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6)) drop-shadow(0 0 25px rgba(234, 179, 8, 0.6));
            z-index: 3;
            animation: float-shawarma 4s ease-in-out infinite;
        }

        .welcome-title {
            font-size: 20px;
            color: #22d3ee;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        .subtitle { 
            font-size: 42px; 
            font-weight: 900; 
            color: #ffffff; 
            margin-bottom: 30px; 
            text-shadow: 0 0 10px #fff, 0 0 20px #22d3ee, 0 0 40px #06b6d4; 
        }

        .buttons-container { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-top: 10px; 
        }

        .btn-option { 
            border: 2px solid rgba(34, 211, 238, 0.4); 
            padding: 16px 20px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            box-sizing: border-box; 
            background: rgba(15, 23, 42, 0.6);
            color: white; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-client {
            background: linear-gradient(90deg, #06b6d4, #7c3aed);
            border: none;
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.4);
        }

        .btn-option:hover { 
            border-color: #22d3ee;
            background: rgba(34, 211, 238, 0.2);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
            transform: translateY(-3px) scale(1.02); 
        }

        .btn-client:hover {
            background: linear-gradient(90deg, #22d3ee, #9333ea);
            box-shadow: 0 0 30px #22d3ee, 0 0 20px #9333ea;
        }

        .icon {
            font-size: 22px;
        }

        .footer-text {
            margin-top: 35px;
            font-size: 12px;
            color: #64748b;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        /* حركة الشاورما */
        @keyframes float-shawarma {
            0% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
            50% { transform: translateX(-50%) translateY(-12px) rotate(3deg); }
            100% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="nebula"></div>

    <div class="container">
        <img class="shawarma-fly">

        <div class="welcome-title">مرحباً بك في مَجرّة</div>
        <div class="subtitle">مطعم المُعز</div>

        <div class="buttons-container">
            <button class="btn option btn-client" onclick="navigate('/client.html')">
                <span class="icon">🚀</span> دخول كـ عميل
            </button>
            <button class="btn option btn-option" onclick="navigate('/delivery.html')">
                <span class="icon">🛵</span> كابتن دليفري
            </button>
            <button class="btn option btn-option" onclick="navigate('/dashboard.html')">
                <span class="icon">📊</span> لوحة تحكم الإدارة
            </button>
        </div>

        <div class="footer-text">
            جميع الحقوق محفوظة لمطعم المعز © 2026
        </div>
    </div>

    <script>
        function navigate(path) {
            window.location.href = path;
        }
    </script>
</body>
</html>
