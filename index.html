<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم المُعز 👑</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية الفضاء وكوكب الأرض الحقيقي متناسقة تماماً مع صفحة الكلاينت */
            background: #03020c url('https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?q=80&w=1200') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* السديم الكوني الملون (البنفسجي والفيروزي) */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(147, 51, 234, 0.25) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(6, 182, 212, 0.2) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        /* الحاوية الزجاجية البلورية الشفافة */
        .container { 
            position: relative; 
            z-index: 2; 
            color: white; 
            text-align: center; 
            max-width: 430px; 
            width: 90%; 
            padding: 95px 25px 40px 25px; /* مساحة علوية عشان تأثير الـ 3D للأكل الطاير */
            background: rgba(10, 11, 26, 0.65); 
            border: 2px solid rgba(6, 182, 212, 0.6); 
            border-radius: 30px; 
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.4), 
                        0 0 80px rgba(147, 51, 234, 0.2), 
                        inset 0 0 25px rgba(6, 182, 212, 0.2); 
            backdrop-filter: blur(20px); 
            box-sizing: border-box; 
            margin: 20px; 
        }

        /* 🍔 طاقم الأكل الطاير 3D في الأعلى متناسق مع الديزاين الأساسي 🍟 */
        .space-food-wrapper {
            position: absolute;
            top: -110px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 220px;
            z-index: 5;
            pointer-events: none;
        }

        .burger-fly {
            position: absolute;
            width: 145px;
            left: -5px;
            top: 5px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6)) drop-shadow(0 0 25px rgba(234, 179, 8, 0.5));
            animation: float-element 4s ease-in-out infinite alternate;
        }

        .fries-fly {
            position: absolute;
            width: 105px;
            right: -10px;
            bottom: 25px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6)) drop-shadow(0 0 20px rgba(239, 68, 68, 0.4));
            animation: float-element 4.5s ease-in-out infinite alternate-reverse;
        }

        .cosmic-glow {
            position: absolute;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.5) 0%, transparent 70%);
            top: 40px;
            left: 40px;
            z-index: -1;
        }

        h1 { 
            font-size: 38px; 
            font-weight: 900; 
            margin: 10px 0 5px 0; 
            color: #ffffff; 
            /* تأثير إضاءة النص المتوهج بالبرق والنيون */
            text-shadow: 0 0 10px #fff, 0 0 20px #22d3ee, 0 0 40px #06b6d4; 
        }

        p { 
            font-size: 17px; 
            color: #cbd5e1; 
            font-weight: normal; 
            margin-bottom: 35px; 
            letter-spacing: 0.5px;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        .btns { 
            display: flex; 
            flex-direction: column; 
            margin-top: 15px; 
        }

        /* زر فضائي احترافي متوهج */
        .btn { 
            border: none; 
            padding: 16px 25px; 
            font-size: 19px; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            box-sizing: border-box; 
        }

        .btn-order { 
            background: linear-gradient(90deg, #06b6d4, #7c3aed);
            color: white; 
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.5), 0 0 15px rgba(124, 58, 237, 0.4);
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .btn-order:hover { 
            background: linear-gradient(90deg, #22d3ee, #9333ea);
            box-shadow: 0 0 35px #22d3ee, 0 0 20px #9333ea; 
            transform: translateY(-2px) scale(1.02); 
        }

    </style>
</head>
<body>

    <div class="nebula"></div>

    <div class="container">
        <div class="space-food-wrapper">
            <div class="cosmic-glow"></div>
            <img src="https://i.ibb.co/680YVfc/burger-png.png" class="burger-fly" alt="برجر">
            <img src="https://i.ibb.co/3mSgMby/fries-png.png" class="fries-fly" alt="بطاطس">
        </div>

        <h1>مطعم المُعز 👑</h1>
        <p>أفضل الأكلات السورية على الإطلاق 🔥</p>

        <div class="btns">
            <button class="btn btn-order" onclick="window.location.href='menu.html'">أطلب على السريع 🚀</button>
        </div>
    </div>

</body>
</html>
