<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم المُعز👑</title>
    <style>
        body {
            margin: 0;
            padding: 20px 0; /* إضافة مسافة أمان علوية وسفلية للموبايل */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* استدعاء صورتك الخلفية الحالية */
            background-image: url('./background.jpg');
            background-color: #03020c;
            
            /* منع تكرار الصورة نهائياً */
            background-repeat: no-repeat;
            
            /* تمركز الصورة في المنتصف تماماً لضمان ظهور العناصر الأساسية */
            background-position: center center;
            
            /* جعل الخلفية ثابتة في مكانها بشكل احترافي أثناء الاسكرول */
            background-attachment: fixed;
            
            /* السر هنا: الصورة تفرش وتغطي كامل الشاشة مهما كان حجم الجهاز */
            background-size: cover;
            
            /* جعل الارتفاع مرن ليناسب الشاشات الطولية كالموبايل */
            min-height: 100vh;
            
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* الحاوية السوداء الشفافة بالظبط زي الصورة الأولى */
        .container { 
            position: relative; 
            z-index: 2; 
            color: white; 
            text-align: center; 
            max-width: 460px; 
            width: 90%; 
            padding: 50px 30px; 
            background: rgba(0, 0, 0, 0.75); /* درجة الشفافية المطلوبة */
            border: 2px solid #ffcc00; /* الخط الأصفر المضيء الجانبي */
            border-radius: 35px; /* الانحناء الدائري للحواف */
            box-shadow: 0 0 35px rgba(255, 204, 0, 0.3); /* توهج أصفر خفيف حول الكارت */
            box-sizing: border-box; 
            margin: auto; /* لضمان التوسط في الشاشات الصغيرة جداً */
        }

        /* شعلة النار اللي فوق الاسم */
        .fire-icon {
            font-size: 36px;
            margin-bottom: 8px;
            animation: pulse 1.5s infinite alternate;
        }

        h1 { 
            font-size: 44px; 
            font-weight: 900; 
            margin: 0px 0 12px 0; 
            color: #ffcc00; /* لون أصفر مضيء للاسم */
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.6); 
        }

        p.subtitle { 
            font-size: 19px; 
            color: #ffffff; 
            font-weight: bold; 
            margin-bottom: 25px; 
        }

        /* أقسام الأكل الدائرية الصغيرة */
        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }

        .cat-item {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ffcc00;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
        }

        .btns { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        /* زر أطلب على السريع الأصفر البيضاوي */
        .btn-order { 
            border: none; 
            padding: 16px 55px; 
            font-size: 22px; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            background: #ffcc00;
            color: #000000; 
            box-shadow: 0 5px 20px rgba(255, 204, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-order:hover { 
            background: #ffa600;
            transform: scale(1.05); 
        }

        /* بيانات الاتصال أسفل الكارت */
        .footer-info {
            margin-top: 35px;
            font-size: 14px;
            color: #e2e2e8;
            line-height: 1.6;
            font-weight:500
        }

        .footer-info span {
            display: block;
            margin-top: 6px;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="fire-icon">&#128293;</div>
        
        <h1>👑مطعم المُعز👑</h1>
        <p class="subtitle">🚀 طعم من كوكب تاني 🚀</p>

        <div class="categories">
            <div class="cat-item">🌯 شاورما</div>
            <div class="cat-item">🍗 وجبات</div>
            <div class="cat-item">🥞 كريب</div>
            <div class="cat-item">🍟 مقبلات</div>
        </div>

        <div class="btns">
            <button class="btn-order" onclick="window.location.href='menu.html'">
                اطلب على السريع 🚀
            </button>
        </div>

        <div class="footer-info">
            <span>📍 - ||سمسطا - شارع 26 يوليو - امام شارع الدهشانيه</span>
            <span>📞 012 0998 9112</span>
        </div>
    </div>

</body>
</html>
