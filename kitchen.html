<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة المطبخ - مطعم الخديوي</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; padding: 20px; font-family: sans-serif; }
        .order-card { background: #262626; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-right: 5px solid #e67e22; position: relative; }
        .qty-badge { background: #e67e22; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }
        .payment-badge { background: #34495e; color: #f1c40f; padding: 5px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; display: inline-block; margin-top: 10px; }
        .btn-done { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <h1>طلبات المطبخ 👨‍🍳</h1>
    <div id="kitchen-orders"></div>

    <script>
        const socket = io();
        
        socket.on('kitchen_receive', (order) => {
            const container = document.getElementById('kitchen-orders');
            const div = document.createElement('div');
            div.className = 'order-card';
            
            const itemsHtml = order.items.map(i => `
                <li><span class="qty-badge">${i.quantity}</span> ${i.name}</li>
            `).join('');

            // زوّدنا هنا طريقة الدفع في العرض المطبخي داخل ديف الـ payment-badge
            div.innerHTML = `
                <h3>طلب من: ${order.name}</h3>
                <p>العنوان: ${order.address} | الهاتف: ${order.phone}</p>
                <ul>${itemsHtml}</ul>
                <div class="payment-badge">طريقة الدفع: ${order.payment || 'كاش عند الاستلام'}</div>
                <button class="btn-done" onclick="this.parentElement.remove()">تم التحضير ✅</button>
            `;
            container.prepend(div);
        });
    </script>
</body>
</html>
