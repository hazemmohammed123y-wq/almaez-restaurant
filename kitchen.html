<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة المطبخ - مطعم المُعز</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; padding: 20px; font-family: sans-serif; }
        .order-card { background: #262626; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-right: 5px solid #e67e22; }
        .past-order-card { background: #1a1a1a; border: 1px solid #27ae60; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-size: 0.9em; color: #bdc3c7; }
        .qty-badge { background: #e67e22; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }
        .payment-badge { background: #34495e; color: #f1c40f; padding: 5px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; display: inline-block; margin-top: 10px; }
        .time-badge { color: #f39c12; font-weight: bold; font-size: 0.85em; display: block; margin-bottom: 5px; }
        .btn-done { background: #27ae60; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        #past-orders-container { border-top: 2px solid #333; margin-top: 40px; padding-top: 20px; }
        
        /* التنسيق الجديد لقائمة الشهور والأيام الذكية */
        .past-header-wrapper { background: #262626; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .past-header-wrapper h2 { margin-top: 0; color: #27ae60; }
        .selectors-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .selector-box { display: flex; align-items: center; gap: 8px; }
        .selector-box label { font-size: 0.95em; color: #e67e22; font-weight: bold; }
        .selector-box select { background: #1a1a1a; color: white; border: 1px solid #e67e22; padding: 8px 12px; border-radius: 5px; font-size: 14px; cursor: pointer; outline: none; }
        
        /* حاوية أزرار الأيام */
        .days-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #444; }
        .day-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 14px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .day-btn:hover { background: #e67e22; border-color: #e67e22; }
        .day-btn.active { background: #27ae60; border-color: #27ae60; color: white; box-shadow: 0 0 8px rgba(39, 174, 96, 0.5); }
        .no-orders-msg { color: #e74c3c; font-style: italic; margin-top: 15px; padding: 10px; display: block; }
    </style>
</head>
<body>
    <h1>طلبات المطبخ 👨‍🍳</h1>
    <div id="kitchen-orders"></div>

    <div id="past-orders-container">
        <div class="past-header-wrapper">
            <h2>المعاملات السابقة ✅</h2>
            
            <div class="selectors-row">
                <div class="selector-box">
                    <label for="year-select">السنة:</label>
                    <select id="year-select" onchange="generateDaysMenu()"></select>
                </div>
                
                <div class="selector-box">
                    <label for="month-select">الشهر:</label>
                    <select id="month-select" onchange="generateDaysMenu()">
                        <option value="1">يناير (1)</option>
                        <option value="2">فبراير (2)</option>
                        <option value="3">مارس (3)</option>
                        <option value="4">أبريل (4)</option>
                        <option value="5">مايو (5)</option>
                        <option value="6">يونيو (6)</option>
                        <option value="7">يوليو (7)</option>
                        <option value="8">أغسطس (8)</option>
                        <option value="9">سبتمبر (9)</option>
                        <option value="10">أكتوبر (10)</option>
                        <option value="11">نوفمبر (11)</option>
                        <option value="12">ديسمبر (12)</option>
                    </select>
                </div>
            </div>

            <div style="font-size: 0.9em; color: #aaa; margin-top: 10px;">اختر اليوم لعرض طلباته:</div>
            <div class="days-container" id="days-buttons-list"></div>
        </div>
        
        <div id="past-orders-list"></div>
    </div>

    <script>
        const socket = io();
        let localOrdersArray = []; // مصفوفة محلية لضمان عدم الاختفاء الفجائي
        let selectedDayGlobal = null; // الاحتفاظ باليوم المختار حالياً

        // إعداد الواجهة عند تحميل الصفحة وتعيين تاريخ اليوم تلقائياً
        window.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const currentYear = today.getFullYear();
            const currentMonth = today.getMonth() + 1;
            selectedDayGlobal = today.getDate();

            // تعبئة قائمة السنوات (السنة الحالية والسنوات السابقة)
            const yearSelect = document.getElementById('year-select');
            for (let i = currentYear; i >= currentYear - 2; i--) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = i;
                yearSelect.appendChild(opt);
            }

            // ضبط الاختيارات على الشهر والسنة الحاليين تلقائياً
            yearSelect.value = currentYear;
            document.getElementById('month-select').value = currentMonth;

            // توليد أزرار الأيام بناءً على الشهر والسنة الحاليين
            generateDaysMenu();
        </script>
        
        <script>
        // دالة لتوليد أزرار أيام الشهر المختار تلقائياً
        function generateDaysMenu() {
            const year = parseInt(document.getElementById('year-select').value, 10);
            const month = parseInt(document.getElementById('month-select').value, 10);
            const daysContainer = document.getElementById('days-buttons-list');
            daysContainer.innerHTML = '';

            // معرفة عدد أيام الشهر المختار بدقة (بما في ذلك السنوات الكبيسة)
            const daysInMonth = new Date(year, month, 0).getDate();

            // إذا كان المستخدم يغير الشهر وكان اليوم القديم أكبر من أيام الشهر الجديد، نقوم بضبطه
            if (selectedDayGlobal > daysInMonth) {
                selectedDayGlobal = daysInMonth;
            }

            // إنشاء زر لكل يوم في الشهر
            for (let day = 1; day <= daysInMonth; day++) {
                const btn = document.createElement('button');
                btn.className = 'day-btn';
                if (day === selectedDayGlobal) {
                    btn.className = 'day-btn active';
                }
                btn.textContent = day;
                btn.onclick = function() {
                    // إلغاء تفعيل الزر السابق وتفعيل الزر الحالي
                    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedDayGlobal = day;
                    
                    // تشغيل الفلترة فوراً لعرض طلبات هذا اليوم المحدد
                    filterPastOrdersByDate();
                };
                daysContainer.appendChild(btn);
            }

            // تشغيل الفلترة بعد توليد الأيام مباشرة
            filterPastOrdersByDate();
        }

        // دالة مساعدة لتحويل أرقام التاريخ الهندي/العربي لأرقام إنجليزية للمقارنة السليمة
        function convertArabicDigitsToEnglish(str) {
            if (!str) return '';
            return str.replace(/[٠-٩]/g, function (d) {
                return d.charCodeAt(0) - 1632;
            });
        }

        // دالة الفلترة الذكية بناءً على (السنة - الشهر - اليوم المختار من الأزرار)
        function filterPastOrdersByDate() {
            const selYear = parseInt(document.getElementById('year-select').value, 10);
            const selMonth = parseInt(document.getElementById('month-select').value, 10);
            const selDay = selectedDayGlobal;

            const pastOrdersList = document.getElementById('past-orders-list');
            pastOrdersList.innerHTML = '';

            let foundOrdersCount = 0;

            // فرز وعرض الطلبات السابقة المتوافقة تماماً مع اليوم والشهر والسنة المحددة
            localOrdersArray.forEach(order => {
                if (order.status !== 'done') return;

                // تنظيف تاريخ الطلب المحفوظ وتحويل أرقامه
                let cleanOrderDate = convertArabicDigitsToEnglish(order.date); 
                
                // استخراج التاريخ الفعلي قبل علامة الساعة
                let datePart = cleanOrderDate.split(' - ')[0].trim(); 

                // فصل اليوم والشهر والسنة من تاريخ الطلب القادم من مونجو دي بي
                let orderDay, orderMonth, orderYear;
                if (datePart.includes('/')) {
                    const dParts = datePart.split('/');
                    orderDay = parseInt(dParts[0], 10);
                    orderMonth = parseInt(dParts[1], 10);
                    orderYear = parseInt(dParts[2], 10);
                } else if (datePart.includes('-')) {
                    const dParts = datePart.split('-');
                    if (dParts[0].length === 4) {
                        orderYear = parseInt(dParts[0], 10);
                        orderMonth = parseInt(dParts[1], 10);
                        orderDay = parseInt(dParts[2], 10);
                    } else {
                        orderDay = parseInt(dParts[0], 10);
                        orderMonth = parseInt(dParts[1], 10);
                        orderYear = parseInt(dParts[2], 10);
                    }
                }

                // شرط الفرز الدقيق: يطابق اليوم والشهر والسنة المسترجعة بالكامل
                if (orderYear === selYear && orderMonth === selMonth && orderDay === selDay) {
                    renderPastOrder(order);
                    foundOrdersCount++;
                }
            });

            // رسالة تنبيهية في حال عدم وجود فواتير لهذا اليوم المحدد
            if (foundOrdersCount === 0) {
                pastOrdersList.innerHTML = `<span class="no-orders-msg">لا توجد معاملات سابقة مسجلة في هذا اليوم (${selDay}/${selMonth}/${selYear})</span>`;
            }
        }

        // دالة لعرض وإعادة بناء شاشة الطلبات بالكامل من مصفوفة البيانات
        function refreshOrdersScreen() {
            document.getElementById('kitchen-orders').innerHTML = '';
            
            // 1. عرض الطلبات المعلقة أولاً (التي تحتاج لتحضير لايف)
            localOrdersArray.forEach(order => {
                if (order.status === 'pending') {
                    renderPendingOrder(order);
                }
            });

            // 2. تشغيل الفرز للأيام والطلبات السابقة
            filterPastOrdersByDate();
        }

        // محاولة جلب البيانات المخزنة محلياً فوراً كشاشة مؤقتة سريعة أثناء التحميل لقفل مشكلة الريفرش
        const savedCache = localStorage.getItem('backup_kitchen_orders');
        if (savedCache) {
            localOrdersArray = JSON.parse(savedCache);
        }

        // 1. استقبال كل الطلبات القادمة من السيرفر والداتابيز (MongoDB) وتحديث الشاشة والـ Cache
        socket.on('load_saved_orders', (orders) => {
            localOrdersArray = orders;
            localStorage.setItem('backup_kitchen_orders', JSON.stringify(orders));
            refreshOrdersScreen();
        });

        // طلب جلب البيانات مجدداً فور استقرار اتصال السوكيت لضمان التحديث التلقائي
        socket.on('connect', () => {
            socket.emit('request_orders_refresh');
        });

        // 2. استقبال طلب جديد لايف وضمان حفظه محلياً وفي الشاشة
        socket.on('kitchen_receive', (order) => {
            if (!localOrdersArray.some(o => o._id === order._id)) {
                localOrdersArray.push(order);
                localStorage.setItem('backup_kitchen_orders', JSON.stringify(localOrdersArray));
                if (order.status === 'pending') {
                    renderPendingOrder(order);
                } else if (order.status === 'done') {
                    filterPastOrdersByDate();
                }
            }
        });

        // استقبال تحديثات الحالة من الأجهزة الأخرى لو مفتوح أكثر من شاشة للمطبخ
        socket.on('order_status_updated_global', (data) => {
            const orderIndex = localOrdersArray.findIndex(o => o._id === data.id);
            if (orderIndex !== -1) {
                localOrdersArray[orderIndex].status = data.status;
                localStorage.setItem('backup_kitchen_orders', JSON.stringify(localOrdersArray));
                refreshOrdersScreen();
            }
        });

        // دالة لعرض الطلبات الحالية (في المطبخ)
        function renderPendingOrder(order) {
            const container = document.getElementById('kitchen-orders');
            if (document.querySelector(`[data-id="${order._id}"]`)) return;

            const div = document.createElement('div');
            div.className = 'order-card';
            div.setAttribute('data-id', order._id);
            
            const itemsHtml = order.items.map(i => `
                <li><span class="qty-badge">${i.quantity}</span> ${i.name}</li>
            `).join('');

            div.innerHTML = `
                <span class="time-badge">تاريخ ووقت الوصول: ${order.date}</span>
                <h3>طلب من: ${order.name}</h3>
                <p>العنوان: ${order.address} | الهاتف: <span class="phone-number">${order.phone}</span></p>
                <ul>${itemsHtml}</ul>
                <div class="payment-badge">طريقة الدفع: ${order.payment || 'كاش عند الاستلام'}</div>
                <br>
                <button class="btn-done" onclick="moveToPast('${order._id}', this.parentElement)">تم التحضير ✅</button>
            `;
            container.prepend(div);
        }

        // دالة لعرض الطلبات السابقة
        function renderPastOrder(order) {
            const pastContainer = document.getElementById('past-orders-list');
            
            // منع التكرار في المعاملات السابقة الفلترة
            const itemsList = order.items.map(i => `${i.quantity} ${i.name}`).join(' - ');
            
            const pastDiv = document.createElement('div');
            pastDiv.className = 'past-order-card';
            pastDiv.innerHTML = `
                <strong>تم الانتهاء:</strong> طلب من: ${order.name} <br>
                <strong>الطلبات:</strong> ${itemsList} <br>
                <strong>رقم الهاتف:</strong> ${order.phone} <br>
                <small>وقت الوصول: ${order.date}</small>
            `;
            pastContainer.appendChild(pastDiv);
        }

        // تحويل الطلب لـ "تم التحضير" وإبلاغ السيرفر ليحدثه في قاعدة البيانات
        function moveToPast(orderId, element) {
            socket.emit('update_order_status', { id: orderId, status: 'done' });

            const orderIndex = localOrdersArray.findIndex(o => o._id === orderId);
            if (orderIndex !== -1) {
                localOrdersArray[orderIndex].status = 'done';
                localStorage.setItem('backup_kitchen_orders', JSON.stringify(localOrdersArray));
            }

            refreshOrdersScreen();
            element.remove();
        }

        // محاولة جلب احتياطية من خلال مسار الـ API العادي إذا طال وقت اتصال السوكيت
        setTimeout(async () => {
            if (localOrdersArray.length === 0) {
                try {
                    const res = await fetch('/api/orders');
                    const backupOrders = await res.json();
                    if (backupOrders && backupOrders.length > 0) {
                        localOrdersArray = backupOrders;
                        localStorage.setItem('backup_kitchen_orders', JSON.stringify(backupOrders));
                        refreshOrdersScreen();
                    }
                } catch(e) { console.log("خطأ في جلب بيانات الـ API الاحتياطية"); }
            }
        }, 2000);
    </script>
</body>
</html>
