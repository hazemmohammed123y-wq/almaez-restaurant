<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة المطبخ - مطعم المُعز</title>
    <style>
        body { background: #1a1a1a; color: white; padding: 20px; font-family: sans-serif; }
        .order-card { background: #262626; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-right: 5px solid #e67e22; }
    </style>
</head>
<body>
    <h1>طلبات المطبخ 👨‍🍳</h1>
    <div id="kitchen-orders"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { /* نفس الكود اللي فوق بالضبط */ };
        const db = getFirestore(initializeApp(firebaseConfig));
        const container = document.getElementById('kitchen-orders');

        const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const order = doc.data();
                container.innerHTML += `
                    <div class="order-card">
                        <h3>طلب من: ${order.name}</h3>
                        <p>العنوان: ${order.address} | الهاتف: ${order.phone}</p>
                        <ul>${order.items.map(i => `<li>${i.quantity} x ${i.name}</li>`).join('')}</ul>
                        <div style="color:#f1c40f">الدفع: ${order.payment}</div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
