<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تأكيد الطلب - مطعم المُعز 👑</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0c; color: white; padding: 20px; }
        .checkout-card { background: #1a1a20; padding: 30px; border-radius: 20px; max-width: 500px; margin: auto; border: 2px solid #ff7b00; }
        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; }
        .btn-confirm { background: #ff7b00; padding: 15px; border: none; border-radius: 30px; color: white; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="checkout-card">
        <h1>تأكيد الطلب 📋</h1>
        <div id="order-details">جاري التحميل...</div>
        <input type="text" id="customer-name" placeholder="الاسم الكامل" required>
        <input type="tel" id="customer-phone" placeholder="رقم الهاتف (11 رقم)" required>
        <textarea id="customer-address" placeholder="العنوان بالتفصيل" required></textarea>
        <select id="payment-method"><option>كاش عند الاستلام</option><option>محفظة إلكترونية</option></select>
        <button id="submit-btn" class="btn-confirm">إرسال الطلب للمطبخ 🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaerEGRadJSRkRzL3rIf9aG0mLmVmHQOg",
            authDomain: "restrant-db79d.firebaseapp.com",
            projectId: "restrant-db79d",
            storageBucket: "restrant-db79d.firebasestorage.app",
            messagingSenderId: "473751126691",
            appId: "1:473751126691:web:d8ff505a915fdde0a97516"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        
        document.getElementById('order-details').innerHTML = cart.map(i => `<div>${i.name} x ${i.quantity}</div>`).join('');

        // الربط البرمجي للزرار (ده الحل للمشكلة)
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            const address = document.getElementById('customer-address').value;
            const payment = document.getElementById('payment-method').value;

            if(!name || !phone || !address) {
                alert("يرجى ملء جميع البيانات");
                return;
            }

            try {
                await addDoc(collection(db, "orders"), {
                    name, phone, address, payment,
                    items: cart,
                    createdAt: new Date().toISOString()
                });
                alert('تم إرسال الطلب للمطبخ بنجاح!');
                localStorage.removeItem('cart');
                window.location.href = 'clint.html';
            } catch (e) {
                console.error(e);
                alert('حدث خطأ أثناء الإرسال، تأكد من اتصالك بالإنترنت');
            }
        });
    </script>
</body>
</html>
