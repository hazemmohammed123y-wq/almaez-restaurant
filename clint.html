<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم المُعز 👑</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #020208 url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1000') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .overlay { 
            background: rgba(3, 2, 10, 0.5); 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }

        .giant-planet {
            position: absolute;
            width: 300px;
            height: 300px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Saturn_during_Equinox.jpg/640px-Saturn_during_Equinox.jpg') no-repeat center center;
            background-size: contain;
            top: -50px;
            left: -8px;
            opacity: 0.35;
            z-index: 1;
            filter: drop-shadow(0 0 20px rgba(255, 170, 0, 0.3));
            animation: spin 120s linear infinite;
        }

        .small-planet {
            position: absolute;
            width: 120px;
            height: 120px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/VallesMarineris9411.jpg/640px-VallesMarineris9411.jpg') no-repeat center center;
            background-size: contain;
            bottom: 10%;
            right: 5%;
            opacity: 0.25;
            z-index: 1;
            animation: float 6s ease-in-out infinite alternate;
        }

        .container { 
            position: relative; 
            z-index: 2; 
            color: white; 
            text-align: center; 
            max-width: 450px; 
            width: 90%; 
            padding: 60px 30px 40px 30px; 
            background: rgba(12, 9, 21, 0.85); 
            border: 3px solid #ffaa00; 
            border-radius: 25px; 
            box-shadow: 0 0 40px #ff7b00, inset 0 0 20px rgba(255, 170, 0, 0.3); 
            backdrop-filter: blur(15px); 
            box-sizing: border-box; 
            margin: 15px; 
        }

        /* 🚀 صورة رائد الفضاء الطاير 🚀 */
        .astronaut-fly {
            position: absolute;
            top: -110px; /* خارج برة الإطار من فوق */
            left: 50%;
            transform: translateX(-50%);
            width: 160px; /* مقاس مناسب */
            height: auto;
            /* استخدام المسار المحلي بعد حفظ الصورة */
            content: url('astronaut.png'); 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)) drop-shadow(0 0 20px rgba(139, 92, 246, 0.6));
            z-index: 3;
            animation: float-astronaut 5s ease-in-out infinite;
        }

        h1 { 
            font-size: 30px; 
            margin: 20px 0 5px 0; 
            color: #ffaa00; 
        }
        .subtitle { 
            font-size: 42px; 
            font-weight: 900; 
            color: #ffcc00; 
            margin-bottom: 5px; 
            text-shadow: 0 0 20px #ffcc00, 0 0 35px #ffaa00; 
        }
        .tagline { 
            font-size: 17px; 
            color: #ffffff; 
            font-weight: normal; 
            margin-bottom: 30px; 
            letter-spacing: 0.5px; 
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }
        .menu-tags { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-bottom: 35px; 
        }
        .tag { 
            background: rgba(25, 18, 10, 0.9); 
            border: 1.5px solid #ffcc00; 
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.4);
            color: #ffcc00; 
            padding: 8px 14px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: bold; 
            transition: all 0.3s ease;
        }
        .tag:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 15px #ffcc00;
        }
        .buttons-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-top: 20px; 
        }
        .btn { 
            border: none; 
            padding: 18px 25px; 
            font-size: 20px; 
            font-weight: bold; 
            border-radius: 30px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            box-sizing: border-box; 
        }
        .btn-yellow { 
            background: linear-gradient(135deg, #ffcc00, #ff7b00);
            color: white; 
            box-shadow: 0 0 25px #ff7b00, 0 4px 15px rgba(0,0,0,0.5); 
        }
        .btn-yellow:hover { 
            background: linear-gradient(135deg, #ffde4d, #ff9124);
            box-shadow: 0 0 35px #ffaa00; 
            transform: scale(1.04); 
        }
        .footer-branch { 
            margin-top: 25px; 
            border-top: 1px dashed rgba(255, 170, 0, 0.5); 
            padding-top: 20px; 
            font-size: 14px; 
            color: #e0e0e5; 
            line-height: 1.7; 
        }
        
        /* حركة رائد الفضاء */
        @keyframes float-astronaut {
            0% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
            50% { transform: translateX(-50%) translateY(-15px) rotate(-3deg); }
            100% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-15px); }
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="giant-planet"></div>
    <div class="small-planet"></div>

    <div class="overlay"></div>

    <div class="container">
        <img class="astronaut-fly">

        <h1>👑</h1>
        <div class="subtitle">مطعم المُعز</div>
        <div class="tagline">← طعم من كوكب تاني 🚀 →</div>

        <div class="menu-tags">
            <span class="tag">شاورما</span>
            <span class="tag">كريب</span>
            <span class="tag">وجبات</span>
            <span class="tag">بروست</span>
            <span class="tag">مقبلات</span>
        </div>

        <div class="buttons-container">
            <button class="btn btn-yellow" onclick="goToMenu()">أطلب على السريع 🚀</button>
        </div>

        <div class="footer-branch">
            📍 سمسطا - شارع 26 يوليو <br>(بجوار الفنجري للأحذية - أمام شارع الدهشانية)<br>
            <div style="margin-top: 10px;">
                📞 للطلب: <span style="color: #ffcc00; font-weight: bold; text-shadow: 0 0 5px #ffaa00;">012 0098 4437</span> | <span style="color: #ffcc00; font-weight: bold; text-shadow: 0 0 5px #ffaa00;">011 0913 9112</span>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        function goToMenu() {
            window.location.href = '/menu.html';
        }
    </script>
</body>
</html>
