<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الخديوي 👑</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=1000') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .overlay {
            background: rgba(0, 0, 0, 0.65);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
            max-width: 450px;
            padding: 30px;
        }
        h1 {
            font-size: 42px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .subtitle {
            font-size: 24px;
            color: #f1c40f;
            margin-bottom: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        .tagline {
            font-size: 18px;
            color: #ddd;
            margin-bottom: 40px;
        }
        .buttons-container {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn-yellow { background-color: #f1c40f; color: black; }
        .btn-orange { background-color: #e67e22; color: white; }
        .btn-red { background-color: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>أهلاً بيكم 👋</h1>
        <div class="subtitle">مطعم الخديوي يرحب بكم</div>
        <div class="tagline">أفضل الأكلات الشعبية 🔥</div>

        <div class="buttons-container">
            <button class="btn btn-yellow" onclick="goToMenu()">أطلب على السريع</button>
            <button class="btn btn-orange">الحجز من هنا</button>
            <button class="btn btn-red">أتفرج على الأكل</button>
        </div>
    </div>

    <script>
        function goToMenu() {
            // أول ما يدوس ينقله فوراً لصفحة المنيو اللي هنعملها
            window.location.href = 'menu.html';
        }
    </script>
</body>
</html>
