<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم المُعز 👑</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية كونية غامقة ممتلئة بالنجوم لتعطي إيحاء طعم من كوكب تاني */
            background: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1000') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .overlay { 
            background: rgba(5, 5, 10, 0.6); 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
        }
        .container { 
            position: relative; 
            z-index: 2; 
            color: white; 
            text-align: center; 
            max-width: 450px; 
            width: 90%; 
            padding: 40px 30px; 
            /* خلفية داكنة جداً مع زيادة التباين لرؤية النجوم بالخلف */
            background: rgba(10, 8, 18, 0.85); 
            /* إطار مضيء قوي (تأثير النيون الأصفر والبرتقالي) */
            border: 3px solid #ffaa00; 
            border-radius: 25px; 
            box-shadow: 0 0 35px #ffaa00, inset 0 0 20px rgba(255, 170, 0, 0.4); 
            backdrop-filter: blur(15px); 
            box-sizing: border-box; 
            margin: 15px; 
            animation: pulse-border 4s ease-in-out infinite;
        }
        h1 { 
            font-size: 40px; 
            margin: 0 0 10px 0; 
            color: #ffaa00; 
            text-shadow: 0 0 15px #ffaa00;
            animation: float 3s ease-in-out infinite;
        }
        .subtitle { 
            font-size: 42px; 
            font-weight: 900; 
            color: #ffcc00; 
            margin-bottom: 5px; 
            text-shadow: 0 0 20px #ffcc00, 0 0 30px #ffaa00; 
        }
        .tagline { 
            font-size: 16px; 
            color: #ffffff; 
            font-weight: normal; 
            margin-bottom: 35px; 
            letter-spacing: 0.5px; 
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        .menu-tags { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            flex-wrap: wrap; 
            margin-bottom: 40px; 
        }
        /* تصميم التاجات بشكل مضيء ومميز */
        .tag { 
            background: rgba(25, 18, 10, 0.9); 
            border: 1.5px solid #ffcc00; 
            box-shadow: 0 0 12px rgba(255, 204, 0, 0.5);
            color: #ffcc00; 
            padding: 8px 16px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: bold; 
            transition: all 0.3s ease;
        }
        .tag:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 18px #ffcc00;
        }
        .buttons-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-top: 20px; 
        }
        .btn { 
            border: none; 
            padding: 18px 25px; 
            font-size: 20px; 
            font-weight: bold; 
            border-radius: 30px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            box-sizing: border-box; 
        }
        /* زر مضيء جداً ومتوهج بالكامل */
        .btn-yellow { 
            background: linear-gradient(135deg, #ffcc00, #ff7b00);
            color: white; 
            box-shadow: 0 0 25px #ff7b00, 0 4px 15px rgba(0,0,0,0.5); 
            text-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }
        .btn-yellow:hover { 
            background: linear-gradient(135deg, #ffde4d, #ff9124);
            box-shadow: 0 0 35px #ffaa00, 0 6px 20px rgba(0,0,0,0.6); 
            transform: scale(1.04); 
        }
        .footer-branch { 
            margin-top: 30px; 
            border-top: 1px dashed rgba(255, 170, 0, 0.5); 
            padding-top: 20px; 
            font-size: 14px; 
            color: #e0e0e5; 
            line-height: 1.7; 
        }
        
        /* حركة الأنيميشن للعناصر المتأرجحة */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* حركة نبض خفيفة للتوهج الخارجي للإطار */
        @keyframes pulse-border {
            0% { box-shadow: 0 0 30px rgba(255, 170, 0, 0.5), inset 0 0 15px rgba(255, 170, 0, 0.3); }
            50% { box-shadow: 0 0 45px rgba(255, 170, 0, 0.8), inset 0 0 25px rgba(255, 170, 0, 0.5); }
            100% { box-shadow: 0 0 30px rgba(255, 170, 0, 0.5), inset 0 0 15px rgba(255, 170, 0, 0.3); }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>🔥</h1>
        <div class="subtitle">مطعم المُعز</div>
        <div class="tagline">← طعم من كوكب تاني 🚀 →</div>

        <div class="menu-tags">
            <span class="tag">شاورما</span>
            <span class="tag">كريب</span>
            <span class="tag">وجبات</span>
            <span class="tag">بروست</span>
            <span class="tag">مقبلات</span>
        </div>

        <div class="buttons-container">
            <button class="btn btn-yellow" onclick="goToMenu()">أطلب على السريع 🚀</button>
        </div>

        <div class="footer-branch">
            📍 سمسطا - شارع 26 يوليو <br>(بجوار الفنجري للأحذية - أمام شارع الدهشانية)<br>
            <div style="margin-top: 10px;">
                📞 للطلب: <span style="color: #ffcc00; font-weight: bold; text-shadow: 0 0 5px #ffaa00;">012 0098 4437</span> | <span style="color: #ffcc00; font-weight: bold; text-shadow: 0 0 5px #ffaa00;">011 0913 9112</span>
            </div>
        </div>
    </div>

    <script>
        // ربط السوكيت الآمن
        const socket = io();

        function goToMenu() {
            // التحويل لصفحة المنيو
            window.location.href = '/menu.html';
        }
    </script>
</body>
</html>
