<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم المُعز 👑</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية كوكب الأرض الحقيقي والفضاء العميق */
            background: #03020c url('https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?q=80&w=1200') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* سديم وسحب كونية ملونة (بنفسجي وفيروزي) في الخلفية لمنح نفس روح الصورة */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(147, 51, 234, 0.25) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.2) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        /* حاوية التصميم البلورية الشفافة مع تباين ألوان نيون */
        .container { 
            position: relative; 
            z-index: 2; 
            color: white; 
            text-align: center; 
            max-width: 430px; 
            width: 90%; 
            padding: 90px 25px 35px 25px; /* مساحة علوية كبيرة عشان دمج الساندوتش */
            /* خلفية زجاجية شفافة جداً ومائلة للـ Dark Navy */
            background: rgba(10, 11, 26, 0.65); 
            /* إطار نيون أزرق سماوي/سيان ميكس مع بنفسجي */
            border: 2px solid rgba(6, 182, 212, 0.6); 
            border-radius: 30px; 
            /* التوهج الخارجي والداخلي الخرافي */
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.4), 
                        0 0 80px rgba(147, 51, 234, 0.2), 
                        inset 0 0 25px rgba(6, 182, 212, 0.2); 
            backdrop-filter: blur(20px); 
            box-sizing: border-box; 
            margin: 20px; 
        }

        /* 🍔 الساندوتش الـ 3D الطاير المقطوع الشفاف (بدون خلفية) قاطع الإطار 🍟 */
        .space-food-wrapper {
            position: absolute;
            top: -110px; /* خارج برة الإطار تماماً */
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 220px;
            z-index: 5;
            pointer-events: none;
        }

        /* البرجر الطاير */
        .burger-fly {
            position: absolute;
            width: 150px;
            left: 0;
            top: 0;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6)) drop-shadow(0 0 25px rgba(234, 179, 8, 0.5));
            animation: float-element 4s ease-in-out infinite alternate;
        }

        /* البطاطس الطايرة المتداخلة معاه */
        .fries-fly {
            position: absolute;
            width: 110px;
            right: -10px;
            bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6)) drop-shadow(0 0 20px rgba(239, 68, 68, 0.4));
            animation: float-element 4.5s ease-in-out infinite alternate-reverse;
        }

        /* هالة الطاقة المضيئة بين الأكل */
        .cosmic-glow {
            position: absolute;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(234, 179, 8, 0.6) 0%, transparent 70%);
            top: 40px;
            left: 40px;
            z-index: -1;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        h1 { 
            font-size: 24px; 
            margin: 10px 0 0 0; 
            color: #22d3ee; 
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.6);
        }

        .subtitle { 
            font-size: 46px; 
            font-weight: 900; 
            color: #ffffff; 
            margin-bottom: 2px; 
            /* تأثير إضاءة النص الأبيض المتوهج بالنيون الأزرق */
            text-shadow: 0 0 10px #fff, 0 0 20px #22d3ee, 0 0 40px #06b6d4; 
        }

        .tagline { 
            font-size: 15px; 
            color: #cbd5e1; 
            font-weight: normal; 
            margin-bottom: 30px; 
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        .menu-tags { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            flex-wrap: wrap; 
            margin-bottom: 35px; 
        }

        /* كبسولات المنيو الشفافة المضيئة */
        .tag { 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(34, 211, 238, 0.5); 
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
            color: #38bdf8; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 600; 
            transition: all 0.3s ease;
        }

        .tag:hover {
            background: rgba(34, 211, 238, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 15px #22d3ee;
            color: #fff;
        }

        .buttons-container { 
            display: flex; 
            flex-direction: column; 
            margin-top: 15px; 
        }

        /* زر فضائي متوهج وبيديك إحساس الخيال العلمي */
        .btn-space { 
            border: none; 
            padding: 16px 25px; 
            font-size: 19px; 
            font-weight: bold; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            box-sizing: border-box; 
            background: linear-gradient(90deg, #06b6d4, #7c3aed);
            color: white; 
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.5), 0 0 15px rgba(124, 58, 237, 0.4);
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .btn-space:hover { 
            background: linear-gradient(90deg, #22d3ee, #9333ea);
            box-shadow: 0 0 35px #22d3ee, 0 0 20px #9333ea; 
            transform: translateY(-2px) scale(1.02); 
        }

        .footer-branch { 
            margin-top: 30px; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
            padding-top: 20px; 
            font-size: 13px; 
            color: #94a3b8; 
            line-height: 1.6; 
        }
        
        /* حركات الأنيميشن للفنتازيا الكونية */
        @keyframes float-element {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-12px) rotate(5deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="nebula"></div>

    <div class="container">
        <div class="space-food-wrapper">
            <div class="cosmic-glow"></div>
            <img src="https://i.ibb.co/680YVfc/burger-png.png" class="burger-fly" alt="برجر فضاء">
            <img src="https://i.ibb.co/3mSgMby/fries-png.png" class="fries-fly" alt="بطاطس فضاء">
        </div>

        <h1>👑 سلطنة ومزاج</h1>
        <div class="subtitle">مطعم المُعز</div>
        <div class="tagline">← طعم من كوكب تاني 🚀 →</div>

        <div class="menu-tags">
            <span class="tag">شاورما</span>
            <span class="tag">كريب</span>
            <span class="tag">وجبات</span>
            <span class="tag">بروست</span>
            <span class="tag">مقبلات</span>
        </div>

        <div class="buttons-container">
            <button class="btn btn-space" onclick="goToMenu()">أطلب على السريع 🚀</button>
        </div>

        <div class="footer-branch">
            📍 سمسطا - شارع 26 يوليو <br>(بجوار الفنجري للأحذية - أمام شارع الدهشانية)<br>
            <div style="margin-top: 10px;">
                📞 للطلب: <span style="color: #22d3ee; font-weight: bold;">012 0098 4437</span> | <span style="color: #22d3ee; font-weight: bold;">011 0913 9112</span>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        function goToMenu() {
            window.location.href = '/menu.html';
        }
    </script>
</body>
</html>
